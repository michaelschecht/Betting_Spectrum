        .legend{display:flex;align-items:center;gap:6px;font-size:.7rem;color:#556677}
        .legend-grad{width:140px;height:8px;border-radius:4px;background:linear-gradient(90deg,#22c55e,#86efac,#facc15,#f97316,#ef4444,#7f1d1d)}

        /* ── CONTROLS ── */
        .ctrl{display:flex;align-items:center;gap:6px;padding:6px 24px;background:#0b1120;border-bottom:1px solid #151e30;flex-shrink:0;flex-wrap:wrap}
        .ctrl label{font-size:.65rem;color:#445566;text-transform:uppercase;letter-spacing:.7px}
        .fbtn{padding:3px 10px;border-radius:12px;border:1px solid #1e2d45;background:#0f1724;color:#6688aa;font-size:.68rem;cursor:pointer;transition:all .15s;white-space:nowrap}
        .fbtn:hover{border-color:#3b6a9f;color:#a0c0e0}
        .fbtn.active{background:#1a3358;border-color:#3b82f6;color:#fff}

        /* ── CHART ── */
        .chart-wrap{flex:1;min-height:0;padding:0 8px 4px;position:relative}
        #chart{width:100%;height:100%}

        /* ── TOOLTIP ── */
        .tt{display:none;position:fixed;z-index:9999;background:#101828;border:1px solid #253550;border-radius:10px;padding:0;min-width:340px;max-width:440px;box-shadow:0 12px 48px rgba(0,0,0,.7);pointer-events:none;overflow:hidden}
        .tt-top{padding:12px 16px 10px;border-bottom:1px solid #1a2840}
        .tt-title{font-weight:700;font-size:.92rem;color:#e8f0f8}
        .tt-subtitle{font-size:.7rem;color:#556677;margin-top:2px}

        /* Hovered item detail */
        .tt-focus{padding:10px 16px;background:#0d1522;border-bottom:1px solid #1a2840}
        .tt-focus-row{display:flex;justify-content:space-between;padding:2px 0;font-size:.78rem}
        .tt-lbl{color:#556677}
        .tt-v{color:#c0d0e0;font-weight:600;text-align:right;max-width:200px}

        /* Group items mini-table */
        .tt-group{padding:8px 16px 12px;max-height:240px;overflow-y:auto}
        .tt-group-title{font-size:.65rem;text-transform:uppercase;letter-spacing:.7px;color:#445566;margin-bottom:6px}
        .tt-item{display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid #111b2a;font-size:.75rem}
        .tt-item:last-child{border-bottom:none}
        .tt-item.highlighted{background:#1a2a45;margin:0 -16px;padding:4px 16px;border-radius:4px}
        .tt-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
        .tt-iname{flex:1;color:#8899aa;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .tt-item.highlighted .tt-iname{color:#e0e8f0;font-weight:600}
        .tt-ival{font-weight:700;min-width:55px;text-align:right}

        .footer{text-align:center;padding:4px;font-size:.6rem;color:#2a3545;flex-shrink:0}
    </style>
</head>

// Sort best to worst (left to right)
D.sort((a,b) => b.e - a.e);

// ── CATEGORY COLORS ──
const CC = {
    "Stock Market":"#3b82f6","Bonds":"#06b6d4","Real Estate":"#8b5cf6",
    "Cryptocurrency":"#f59e0b","Options & Derivatives":"#ec4899",
    "Active Trading":"#ef4444","Sports Betting":"#22c55e",
    "Casino Gambling":"#a855f7","Poker & Skill-Based":"#14b8a6",
    "Prediction Markets":"#6366f1","Lottery":"#f43f5e"
};

// ── EDGE → COLOR ──
function ec(e) {
    if (e >= 0) {
        const t = Math.min(e/45,1);
        const r = Math.round(34 + (1-t)*186);    // 34..220
        const g = Math.round(197 + t*58);          // 197..255
        const b = Math.round(94 - t*60);           // 94..34
        return `rgb(${r},${g},${b})`;
    } else {
        const t = Math.min(Math.abs(e)/70,1);
        // from warm yellow to deep dark red
        const r = Math.round(250 - t*123);   // 250..127
        const g = Math.round(204 - t*175);   // 204..29
        const b = Math.round(21 + t*8);      // 21..29
        return `rgb(${r},${g},${b})`;
    }
}

// ── STATE ──
let filter = 'all';

function fd() {
    let d = filter === 'all' ? [...D] : D.filter(x => x.cat === filter);
    d.sort((a,b) => b.e - a.e);
    return d;
}

// ── TOOLTIP ──
const ttEl = document.getElementById('tt');

function showTT(item, data, evt) {
    // Find group siblings
    const siblings = data.filter(d => d.g === item.g);
    const sign = v => v > 0 ? '+' : '';
    const badgeBg = item.e >= 0 ? '#14532d' : '#7f1d1d';
    const badgeBdr = item.e >= 0 ? '#22c55e' : '#ef4444';
    const whoText = item.e > 0 ? 'Player / Investor' : item.e < 0 ? 'House / Market' : 'Break Even';
    const catC = CC[item.cat] || '#667';

    let groupHTML = '';
    if (siblings.length > 1) {
        groupHTML = `<div class="tt-group"><div class="tt-group-title">${item.g} &mdash; ${siblings.length} items in this group</div>`;
        siblings.sort((a,b) => b.e - a.e);
        for (const s of siblings) {
            const hl = s.n === item.n ? ' highlighted' : '';
            const c = ec(s.e);
            const valC = s.e >= 0 ? '#4ade80' : '#f87171';
            groupHTML += `<div class="tt-item${hl}"><div class="tt-dot" style="background:${c}"></div><div class="tt-iname">${s.n}</div><div class="tt-ival" style="color:${valC}">${sign(s.e)}${s.e.toFixed(1)}%</div></div>`;
        }
        groupHTML += '</div>';
    }

    ttEl.innerHTML = `
        <div class="tt-top">
            <div style="display:flex;justify-content:space-between;align-items:center">
                <div class="tt-title">${item.n}</div>
                <div style="font-size:1.15rem;font-weight:800;padding:2px 10px;border-radius:6px;background:${badgeBg};border:1px solid ${badgeBdr};color:${badgeBdr}">${sign(item.e)}${item.e.toFixed(2)}%</div>
            </div>
            <div class="tt-subtitle">${whoText} &bull; <span style="color:${catC}">${item.cat}</span></div>
        </div>
        <div class="tt-focus">
            <div class="tt-focus-row"><span class="tt-lbl">Type</span><span class="tt-v">${item.type}</span></div>
            <div class="tt-focus-row"><span class="tt-lbl">Timeframe</span><span class="tt-v">${item.tf}</span></div>
            <div class="tt-focus-row"><span class="tt-lbl">Volatility</span><span class="tt-v">${item.vol}</span></div>
            <div class="tt-focus-row"><span class="tt-lbl">Win Probability</span><span class="tt-v">${item.wp}</span></div>
            <div class="tt-focus-row"><span class="tt-lbl">Per $100</span><span class="tt-v" style="color:${badgeBdr}">${item.p100}</span></div>
            <div class="tt-focus-row"><span class="tt-lbl">Ruin Speed</span><span class="tt-v">${item.ruin}</span></div>
            <div class="tt-focus-row"><span class="tt-lbl">Skill Factor</span><span class="tt-v">${item.sk}</span></div>
        </div>
        ${groupHTML}
    `;
    ttEl.style.display = 'block';
    posTT(evt);
}

function posTT(evt) {
    const r = ttEl.getBoundingClientRect();
    const p = 14;
    let x = evt.clientX + p;
    let y = evt.clientY - r.height / 2;
    if (x + r.width > window.innerWidth - p) x = evt.clientX - r.width - p;
    if (y < p) y = p;
    if (y + r.height > window.innerHeight - p) y = window.innerHeight - r.height - p;
    ttEl.style.left = x + 'px';
    ttEl.style.top = y + 'px';
}

function hideTT() { ttEl.style.display = 'none'; }

// ── RENDER ──
function render() {
    const data = fd();
    const names = data.map(d => d.n);
    const edges = data.map(d => d.e);
    const colors = data.map(d => ec(d.e));
    const outlineColors = data.map(d => {
        const c = CC[d.cat] || '#556';
        return c + '88';
    });

    const trace = {
        type: 'bar',
        x: names,
        y: edges,
        customdata: data,
        marker: {
            color: colors,
            line: { color: outlineColors, width: 0.8 }
        },
        hoverinfo: 'none',
        hovertemplate: ' <extra></extra>'
    };

    const chartEl = document.getElementById('chart');
    const availW = chartEl.parentElement.clientWidth;
    const barW = Math.max(4, availW / data.length - 1);

    const layout = {
        paper_bgcolor: '#080c14',
        plot_bgcolor: '#080c14',
        font: { family:'Segoe UI,system-ui,sans-serif', color:'#556677', size:9 },
        margin: { l:50, r:20, t:20, b:8 },
        hovermode: 'closest',
        hoverdistance: 30,
        xaxis: {
            showticklabels: false,
            showgrid: false,
            zeroline: false
        },
        yaxis: {
            title: { text:'Edge (%)', font:{size:10,color:'#445566'} },
            gridcolor: '#111b28',
            zerolinecolor: '#facc15',
            zerolinewidth: 2.5,
            tickformat: '+.0f',
            ticksuffix: '%',
            tickfont: { size:9 },
            range: [Math.min(...edges) - 5, Math.max(...edges) + 5]
        },
        shapes: [{
            type:'line',x0:-0.5,x1:data.length-0.5,y0:0,y1:0,
            line:{color:'#facc1588',width:2,dash:'dot'}
        }],
        annotations: [
            {x:0.02,y:1,xref:'paper',yref:'paper',xanchor:'left',yanchor:'top',text:'<b>\u2190 PLAYER EDGE</b>',showarrow:false,font:{color:'#4ade8088',size:11}},
            {x:0.98,y:1,xref:'paper',yref:'paper',xanchor:'right',yanchor:'top',text:'<b>HOUSE EDGE \u2192</b>',showarrow:false,font:{color:'#f8717188',size:11}},
            {x:0.5,y:1,xref:'paper',yref:'paper',xanchor:'center',yanchor:'top',text:'BREAK EVEN',showarrow:false,font:{color:'#facc1566',size:9}}
        ],
        showlegend: false,
        bargap: 0.08
    };

    Plotly.newPlot('chart', [trace], layout, {
        displayModeBar: false,
        responsive: true,
        scrollZoom: false
    });

    // Custom hover
    chartEl.on('plotly_hover', function(evtData) {
        const pt = evtData.points[0];
        const item = pt.customdata;
        showTT(item, data, evtData.event);
    });
    chartEl.on('plotly_unhover', hideTT);
    chartEl.addEventListener('mousemove', function(e) {
        if (ttEl.style.display === 'block') posTT(e);
    });
}

// ── FILTER BUTTONS ──
document.querySelectorAll('.fbtn[data-f]').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.fbtn[data-f]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        filter = btn.dataset.f;
        render();
    });
});

window.addEventListener('resize', render);
render();
</script>
